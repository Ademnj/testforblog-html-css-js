<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Adem Karpuz</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0f172a; color: white; }
        
        .contact-container {
            padding: 150px 0 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            justify-content: center;
        }

        /* İletişim Bilgileri Kutusu */
        .contact-info {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
        }

        .info-item i {
            font-size: 1.5rem;
            color: var(--accent);
        }

        /* Modern İletişim Formu */
        .contact-form {
            flex: 1.5;
            min-width: 350px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(242, 169, 0, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }

        /* Arka Plan Grid Etkisi (CV sayfasıyla uyumlu) */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <nav style="background: rgba(166, 171, 182, 0.95);">
        <div class="container">
            <a href="index.html" class="logo">ADEM KARPUZ<span></span></a>
            <ul class="nav-links">
                <li><a href="index.html">Geri Dön</a></li>
            </ul>
        </div>
    </nav>

    <div class="container contact-container">
        
        <div class="contact-info" data-aos="fade-right">
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Hadi <span style="color:var(--accent)">Konuşalım.</span></h1>
            <p style="color: #94a3b8; margin-bottom: 40px;">Mesaj gönderilmiyor sadeceg göstermelik olsun diye ekledim.</p>
            
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <div>
                    <p style="font-size: 0.8rem; color: #64748b;">E-Posta</p>
                    <p>ADEM KARPUZ</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <div>
                    <p style="font-size: 0.8rem; color: #64748b;">Konum</p>
                    <p>Kahramanmaraş, Türkiye</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fab fa-linkedin-in"></i>
                <div>
                    <p style="font-size: 0.8rem; color: #64748b;">LinkedIn</p>
                    <p>Ademkzj</p>
                </div>
            </div>
        </div>

        <div class="contact-form" data-aos="fade-left">
            <form id="myContactForm">
                <div class="form-group">
                    <label>Adınız Soyadınız</label>
                    <input type="text" placeholder="Adem Karpuz" required>
                </div>
                <div class="form-group">
                    <label>E-Posta Adresiniz</label>
                    <input type="email" placeholder="ornek@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Konu</label>
                    <input type="text" placeholder="İş Birliği / Soru" required>
                </div>
                <div class="form-group">
                    <label>Mesajınız</label>
                    <textarea rows="5" placeholder="Mesajınızı buraya bırakın..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Mesajı Gönder</button>
            </form>
        </div>

    </div>

    <footer>
        <div class="container">
            <p>BANA ULAŞMAK İÇİN</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Form Gönderildiğinde Küçük Bir Geri Bildirim
        document.getElementById('myContactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Mesajınız başarıyla gönderildi # TEST İÇİN YAPILMIŞTIR GÖNDERİLME YOK #');
            this.reset();
        });
    </script>
</body>
</html>
